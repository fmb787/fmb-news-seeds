name: Fetch News

on:
  schedule:
    - cron: '* * * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - run: pip install requests
      - run: python fetch_and_push.py
        env:
          GITHUB_TOKEN: ${{ secrets.NEWS_GITHUB_TOKEN }}
